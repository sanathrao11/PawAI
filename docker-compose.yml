version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pawai
      POSTGRES_PASSWORD: pawai
      POSTGRES_DB: pawai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawai"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://pawai:pawai@db:5432/pawai
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.celery_app.celery worker --loglevel=info --concurrency=2
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://pawai:pawai@db:5432/pawai
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  pgdata:
